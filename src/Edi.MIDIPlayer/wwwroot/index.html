<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edi MIDI Player - Romantic Visualizer</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="EDI MIDI Player" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-gradient"></div>
    <div class="stars"></div>
    <div id="emoji-container"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="musical-note">🎵</span>
                Edi MIDI Player
                <span class="musical-note">🎶</span>
            </h1>
            <p class="subtitle">「用代码搭好舞台，把光和乐留给你」</p>
        </header>

        <div class="visualization-area">
            <div id="piano-container">
                <!-- Will be generated by JavaScript -->
            </div>
        </div>

        <div class="info-panel">
            <div class="info-section">
                <h3>Status</h3>
                <div id="status-message">Waiting for MIDI...</div>
            </div>
            <div class="info-section">
                <h3>Active Notes</h3>
                <div id="active-notes">0</div>
            </div>
        </div>

        <div class="log-panel">
            <h3>Event Log</h3>
            <div id="event-log"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/9.0.6/signalr.min.js" integrity="sha512-kkMt8UThSmWcdXLYFaGZ/U6vyWSNLZMUWQ5SMeF80pGqrEkH5ei9D/3MbVQpB8p7D5C3A4vlX7BpsWTT2BfB6A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="app.js"></script>
</body>
</html>
